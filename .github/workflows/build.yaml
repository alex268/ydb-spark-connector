name: Build YDB Spark Connector

on:
  push:
    branches:
      - main
      - release*
  pull_request:
      type: [opened, reopened, edited, synchronize]

jobs:
  prepare_cache:
    name: Create Maven Cache
    runs-on: ubuntu-latest

    env:
        MAVEN_ARGS: --batch-mode -Dstyle.color=always

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: |
              pom.xml
              connector/pom.xml
              connector-shaded/pom.xml

      - name: Download YDB Spark dependencies
        run: mvn $MAVEN_ARGS dependency:go-offline

  build:
    name: Verify YDB Spark
    runs-on: ubuntu-latest
    needs: prepare_cache

    strategy:
      max-parallel: 4
      fail-fast: false
      matrix:
        java: [ '8', '17']
        scala: [ '2.12', '2.13' ]
        spark: [ '3.2.4', '3.3.4', '3.4.4', '3.5.4' ]

    env:
        MAVEN_ARGS: --batch-mode --update-snapshots -Dstyle.color=always -DYDB_DOCKER_ISOLATION=true

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: |
              pom.xml
              connector/pom.xml
              connector-shaded/pom.xml

      - name: Download dependecies
        run: mvn $MAVEN_ARGS -Dscala.version=${{ matrix.scala }} -Dspark.version=${{ matrix.spark }} dependency:go-offline

      - name: Verify YDB Spark Connector
        run: mvn $MAVEN_ARGS -Dscala.version=${{ matrix.scala }} -Dspark.version=${{ matrix.spark }} -Dmaven.javadoc.skip=true verify

  coverage:
    if: github.repository == 'ydb-platform/ydb-spark-connector'
    name: Coverage YDB Spark Connector
    runs-on: ubuntu-latest
    needs: build

    env:
        MAVEN_ARGS: --batch-mode --update-snapshots -Dstyle.color=always -DYDB_DOCKER_ISOLATION=true

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: |
              pom.xml
              connector/pom.xml
              connector-shaded/pom.xml

      - name: Build with Maven
        run: mvn $MAVEN_ARGS test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

